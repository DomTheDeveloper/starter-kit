name: A387471 exact Lean audit macOS

on:
  pull_request:
    branches: [master]
    paths:
      - 'A387471_MACOS_TRIGGER'

permissions:
  contents: read

concurrency:
  group: a387471-exact-audit-macos-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-macos:
    runs-on: macos-14
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - name: Fetch exact CRL proof commit
        run: |
          git clone https://github.com/DomTheDeveloper/crl.git crl
          cd crl
          git checkout f4d15cfb3fa3af3550223e266f67a569819fde82
          test "$(git rev-parse HEAD)" = "f4d15cfb3fa3af3550223e266f67a569819fde82"
      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Guard source
        run: |
          ! grep -RnE --include='*.lean' '(^|[[:space:]])(sorry|admit|native_decide)([[:space:]]|$)' crl/proofs/lean/A387471
      - name: Resolve pinned Mathlib
        working-directory: crl/proofs/lean/A387471
        run: lake update
      - name: Fetch Mathlib cache
        working-directory: crl/proofs/lean/A387471
        run: lake exe cache get || true
      - name: Build repaired foundation modules
        working-directory: crl/proofs/lean/A387471
        shell: bash
        run: |
          set -o pipefail
          lake build A387471Fourier A387471Arithmetic A387471AngleBounds 2>&1 | tee build.log
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a387471-foundation-audit-macos
          path: crl/proofs/lean/A387471/build.log
          if-no-files-found: warn
