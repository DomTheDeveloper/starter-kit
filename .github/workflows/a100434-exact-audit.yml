name: A100434 exact audit

on:
  pull_request:
    branches: [master]
    paths:
      - '.github/workflows/a100434-exact-audit.yml'
      - '.github/a100434-audit-trigger'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout exact Formal Conjectures head
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: f6fce00d9f0fb5cfcd04b63016eb4c3fa76a319d
          fetch-depth: 1

      - name: Install Lean
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: |
            .lake/packages
            .lake/build
          key: a100434-starter-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}
          restore-keys: a100434-starter-${{ runner.os }}-${{ runner.arch }}-

      - name: Get Mathlib cache
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            lake exe cache get && exit 0
            sleep 10
          done
          exit 1

      - name: Build utility dependency
        run: |
          set -o pipefail
          lake build FormalConjecturesUtil 2>&1 | tee a100434-dependency.log

      - name: Compile A100434
        run: |
          set -o pipefail
          lake env lean FormalConjectures/OEIS/100434.lean 2>&1 | tee a100434-compile.log

      - name: Audit theorem axioms
        run: |
          cat > A100434Axioms.lean <<'EOF'
          import FormalConjectures.OEIS.«100434»
          #print axioms OeisA100434.a100434_auxiliary_identities
          EOF
          set -o pipefail
          lake env lean A100434Axioms.lean 2>&1 | tee a100434-axioms.log
          ! grep -E 'sorryAx|Lean\.ofReduceBool|Lean\.trustCompiler' a100434-axioms.log

      - name: Upload exact diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a100434-exact-${{ github.run_id }}
          path: |
            a100434-dependency.log
            a100434-compile.log
            a100434-axioms.log
          if-no-files-found: warn
