name: A387471 exact Lean audit

on:
  pull_request:
    branches: [master]
    paths:
      - 'A387471_AUDIT_TRIGGER'
      - '.github/workflows/a387471-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a387471-exact-audit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Fetch exact CRL proof commit
        run: |
          git clone https://github.com/DomTheDeveloper/crl.git crl
          cd crl
          git checkout 17ffe1b3834dce1b8d66c25b1814a10a91288365
          test "$(git rev-parse HEAD)" = "17ffe1b3834dce1b8d66c25b1814a10a91288365"

      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Guard source
        run: |
          ! grep -RnE --include='*.lean' '(^|[[:space:]])(sorry|admit|native_decide)([[:space:]]|$)' crl/proofs/lean/A387471

      - name: Resolve pinned Mathlib
        working-directory: crl/proofs/lean/A387471
        run: lake update

      - name: Fetch Mathlib cache
        working-directory: crl/proofs/lean/A387471
        run: lake exe cache get || true

      - name: Build exact theorem stack
        working-directory: crl/proofs/lean/A387471
        shell: bash
        run: |
          set -o pipefail
          lake build 2>&1 | tee build.log

      - name: Audit exact theorem axioms
        working-directory: crl/proofs/lean/A387471
        shell: bash
        run: |
          cat > AuditExact.lean <<'EOF'
          import A387471Exact
          #print axioms A387471.exactStatement_proved
          EOF
          set -o pipefail
          lake env lean AuditExact.lean 2>&1 | tee axioms.log
          ! grep -q 'sorryAx' build.log axioms.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a387471-exact-audit
          path: |
            crl/proofs/lean/A387471/build.log
            crl/proofs/lean/A387471/axioms.log
          if-no-files-found: warn
